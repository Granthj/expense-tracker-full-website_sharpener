<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Day to Day Expenses</title>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --teal: #2aabb8;
            --teal-dark: #1e8e9a;
            --teal-light: #e6f7f9;
            --pink: #e91e8c;
            --red-text: #e53935;
            --green-text: #00897b;
            --row-alt: #f0fafb;
            --border: #d0ecef;
            --text: #2d3748;
            --muted: #718096;
            --white: #ffffff;
            --bg: #f7fbfc;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 0 0 60px;
        }

        /* ── Header ── */
        .page-header {
            background: linear-gradient(135deg, var(--teal) 0%, var(--teal-dark) 100%);
            padding: 28px 24px 24px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 10;
            box-shadow: 0 4px 16px rgba(42, 171, 184, 0.25);
        }

        .page-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.35rem, 4vw, 1.9rem);
            color: var(--white);
            letter-spacing: 0.5px;
        }

        .page-header .timestamp {
            font-size: 0.78rem;
            color: rgba(255, 255, 255, 0.75);
            margin-top: 4px;
        }

        /* ── Wrapper ── */
        .container {
            max-width: 920px;
            margin: 0 auto;
            padding: 28px 16px;
            display: flex;
            flex-direction: column;
            gap: 36px;
        }

        /* ── Year badge ── */
        .year-badge {
            text-align: center;
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--teal-dark);
            letter-spacing: 2px;
        }

        /* ── Section ── */
        .section-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text);
            text-align: center;
            margin-bottom: 12px;
            letter-spacing: 0.3px;
        }

        /* ── Table card ── */
        .table-card {
            background: var(--white);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 18px rgba(42, 171, 184, 0.10);
            border: 1px solid var(--border);
        }

        /* ── Month header ── */
        .month-header {
            background: linear-gradient(90deg, var(--teal) 0%, var(--teal-dark) 100%);
            color: var(--white);
            text-align: center;
            padding: 10px 16px;
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
        }

        /* ── Tables ── */
        .expense-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.86rem;
        }

        .expense-table thead tr {
            background: var(--teal);
        }

        .expense-table thead th {
            color: var(--white);
            padding: 10px 14px;
            text-align: left;
            font-weight: 500;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }

        .expense-table thead th:last-child,
        .expense-table thead th:nth-child(4) {
            text-align: right;
        }

        .expense-table tbody tr:nth-child(even) {
            background: var(--row-alt);
        }

        .expense-table tbody tr:hover {
            background: #d9f3f7;
            transition: background 0.15s;
        }

        .expense-table tbody td {
            padding: 8px 14px;
            border-bottom: 1px solid #e8f5f7;
            vertical-align: middle;
        }

        .expense-table tbody td:last-child,
        .expense-table tbody td:nth-child(4) {
            text-align: right;
        }

        /* ── Sub-total rows ── */
        .subtotal-row td {
            background: var(--teal-light) !important;
            font-weight: 600;
            border-top: 2px solid var(--teal);
            border-bottom: 2px solid var(--teal);
        }

        /* ── Grand total row ── */
        .grand-total-row td {
            background: #e6f9f8 !important;
            font-weight: 700;
            font-size: 0.9rem;
            border-top: 2px solid var(--teal-dark);
        }

        .grand-total-row .amount-col {
            color: var(--teal-dark);
        }

        /* ── Savings row ── */
        .savings-row td {
            background: var(--teal-light) !important;
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--green-text);
            text-align: right;
            border-top: 2px solid var(--teal);
            padding: 10px 14px;
        }

        /* ── Amount colors ── */
        .income {
            color: #1a6b5e;
        }

        .expense {
            color: var(--red-text);
        }

        .savings {
            color: var(--green-text);
        }

        /* ── Yearly report table ── */
        .yearly-table thead tr {
            background: var(--teal);
        }

        .yearly-table thead th {
            color: var(--white);
            padding: 10px 14px;
            text-align: left;
            font-weight: 500;
        }

        .yearly-table thead th:nth-child(2),
        .yearly-table thead th:nth-child(3),
        .yearly-table thead th:nth-child(4) {
            text-align: right;
        }

        .yearly-table tbody tr:hover {
            background: #d9f3f7;
        }

        .yearly-table tbody td {
            padding: 10px 14px;
            border-bottom: 1px solid #e8f5f7;
        }

        .yearly-table tbody td:nth-child(2),
        .yearly-table tbody td:nth-child(3),
        .yearly-table tbody td:nth-child(4) {
            text-align: right;
        }

        .yearly-total-row td {
            background: var(--teal-light) !important;
            font-weight: 700;
            border-top: 2px solid var(--teal);
        }

        .yearly-total-row td:nth-child(2) {
            color: var(--teal-dark);
        }

        .yearly-total-row td:nth-child(3) {
            color: var(--red-text);
        }

        .yearly-total-row td:nth-child(4) {
            color: var(--green-text);
        }

        /* ── Notes table ── */
        .notes-table thead tr {
            background: var(--teal);
        }

        .notes-table thead th {
            color: var(--white);
            padding: 10px 14px;
            font-weight: 500;
            text-align: left;
        }

        .notes-table tbody tr:nth-child(even) {
            background: var(--row-alt);
        }

        .notes-table tbody tr:hover {
            background: #d9f3f7;
        }

        .notes-table tbody td {
            padding: 9px 14px;
            border-bottom: 1px solid #e8f5f7;
        }

        /* ── FAB ── */
        .fab {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: var(--teal);
            color: var(--white);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 20px rgba(42, 171, 184, 0.4);
            font-size: 1.4rem;
            transition: background 0.2s, transform 0.15s;
        }

        .fab:hover {
            background: var(--teal-dark);
            transform: scale(1.08);
        }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            .page-header {
                padding: 20px 16px 18px;
            }

            .container {
                padding: 20px 10px;
                gap: 28px;
            }

            .expense-table,
            .yearly-table,
            .notes-table {
                font-size: 0.78rem;
            }

            .expense-table thead th,
            .expense-table tbody td,
            .yearly-table thead th,
            .yearly-table tbody td,
            .notes-table thead th,
            .notes-table tbody td {
                padding: 7px 8px;
            }

            /* Stack table inside scroll wrapper */
            .scroll-wrap {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }

            .fab {
                width: 44px;
                height: 44px;
                font-size: 1.15rem;
            }
        }
    </style>
</head>
